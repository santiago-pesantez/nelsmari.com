<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú — Nelsmari Sous Vide</title>
  <meta name="description" content="Explora nuestro menú de comida gourmet al vacío: proteínas, carbohidratos y vegetales listos para calentar.">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">Nelsmari <span>Sous Vide</span></a>
      <nav class="header__nav">
        <a href="/sous-vide/">Menú</a>
        <a href="/sous-vide/como-calentar.html">Cómo calentar</a>
        <a href="/sous-vide/zonas.html">Zonas de entrega</a>
        <a href="/sous-vide/nosotros.html">Nosotros</a>
      </nav>
      <button class="header__menu-btn" aria-label="Abrir menú" onclick="document.querySelector('.nav-mobile').classList.add('is-open')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile Nav -->
  <div class="nav-mobile">
    <button class="nav-mobile__close" aria-label="Cerrar menú" onclick="this.closest('.nav-mobile').classList.remove('is-open')">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <a href="/">Inicio</a>
    <a href="/sous-vide/">Menú</a>
    <a href="/sous-vide/como-calentar.html">Cómo calentar</a>
    <a href="/sous-vide/zonas.html">Zonas de entrega</a>
    <a href="/sous-vide/nosotros.html">Nosotros</a>
  </div>

  <!-- Menú -->
  <section class="section">
    <div class="container">
      <h1 class="text-center">Nuestro Menú</h1>
      <div class="divider"></div>

      <!-- Filtros -->
      <div class="filter-pills" style="justify-content: center; margin-top: var(--space-xl);" id="category-filters">
        <button class="filter-pill is-active" data-category="todas">Todas</button>
        <button class="filter-pill" data-category="proteinas">Proteínas</button>
        <button class="filter-pill" data-category="carbohidratos">Carbohidratos</button>
        <button class="filter-pill" data-category="vegetales">Vegetales</button>
      </div>

      <!-- Grid de productos — se llena desde JS -->
      <div id="product-grid" class="product-grid"></div>
    </div>
  </section>

  <!-- Cart float (mobile) -->
  <div class="cart-float" id="cart-float">
    <div class="cart-float__info">
      <span class="cart-float__badge" id="cart-count">0</span>
      <span id="cart-total">$0,00</span>
    </div>
    <a href="/sous-vide/checkout.html" class="btn btn--accent btn--sm">Revisar pedido</a>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p>&copy; 2026 Nelsmari Sous Vide. Todos los derechos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/menu.js"></script>
</body>
</html>
